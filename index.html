<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70808 ELITE: COACH MODE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <header>
            <h1>70808 <span class="neon">ELITE</span></h1>
            <div id="clock" class="digital-clock">00:00:00</div>
        </header>

        <section class="card coach-window">
            <h3 class="neon">🎯 CURRENT MISSION</h3>
            <div id="mission-title" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">Initializing...</div>
            <p id="mission-desc" style="color: #aaa; font-size: 0.9rem; margin-bottom: 15px;">Awaiting command...</p>
            <div id="exercise-guide" class="guide-box" style="display:none;">
                <small>EQUIPMENT: 10LB + BANDS</small>
                <div id="movement-steps" style="color: var(--neon); margin-top: 5px; font-style: italic;"></div>
            </div>
        </section>

        <section class="card timer-box">
            <h3 id="timer-label">⏱️ SET TIMER (TARGET: 45s)</h3>
            <div id="timer-display">0s</div>
            <div class="row">
                <button onclick="startTension()" class="btn-start">START SET</button>
                <button onclick="stopTension()" class="btn-pause">PAUSE</button>
            </div>
        </section>

        <section class="card log-inputs">
            <input type="text" id="entry-name" placeholder="Confirm Action (e.g. 40 Squats)">
            <button id="master-add" class="btn-commit">COMMIT TO GROWTH</button>
        </section>

        <ul id="activity-log"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
