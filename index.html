<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70808 ELITE: COMMAND</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <header>
            <h1>70808 <span class="neon">ELITE</span></h1>
            <div id="clock">00:00:00</div>
        </header>

        <div class="card mission-box">
            <h3 class="label">CURRENT MISSION</h3>
            <div id="mission-title">Loading...</div>
            <p id="mission-desc"></p>
        </div>

        <div class="card workout-box">
            <button id="start-workout-btn" onclick="toggleWorkout()">⚡ START TODAY'S WORKOUT</button>
            <div id="routine-steps" style="display:none; margin-top:15px;">
                <h3 class="neon">THE 10LB HYPERTROPHY CIRCUIT</h3>
                <div id="current-exercise-display">
                    <h2 id="ex-title">Step 1: Band Pushups</h2>
                    <p id="ex-instructions">Loop band over back. 30 slow reps.</p>
                </div>
                <div class="timer-display" id="timer">0s</div>
                <div class="row">
                    <button onclick="startTimer()" class="btn-green">START SET</button>
                    <button onclick="nextExercise()" class="btn-blue">NEXT MOVE</button>
                </div>
            </div>
        </div>

        <div class="card">
            <label for="photo-input" class="photo-label">📸 SNAP PROGRESS PHOTO</label>
            <input type="file" id="photo-input" accept="image/*" style="display:none">
        </div>

        <ul id="history-log"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
